# Init SQL in ./docker/postgres/init runs ONLY on first volume creation.
# If the table is missing but the volume already exists, run: ./docker/postgres/apply-schema.sh
# To re-run init from scratch: docker compose down -v && docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: zenon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zenon_bank
      POSTGRES_USER: zenon
      POSTGRES_PASSWORD: zenon123#
    ports:
      - "5432:5432"
    volumes:
      - zenon_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenon -d zenon_bank"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  zenon_pg_data:
